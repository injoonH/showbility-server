spring:
  application:
    name: showbility-server
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
springdoc:
  swagger-ui:
    tags-sorter: alpha
jwt:
  secret: ${JWT_SECRET}
